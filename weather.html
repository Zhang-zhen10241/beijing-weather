<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>北京天气预报 - 顺义&朝阳</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 32px;
            margin-bottom: 10px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.2);
        }

        .header p {
            opacity: 0.9;
            font-size: 14px;
        }

        .update-time {
            background: rgba(255,255,255,0.2);
            padding: 8px 16px;
            border-radius: 20px;
            display: inline-block;
            margin-top: 10px;
            font-size: 13px;
        }

        .weather-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }

        @media (max-width: 768px) {
            .weather-grid {
                grid-template-columns: 1fr;
            }
        }

        .weather-card {
            background: rgba(255,255,255,0.95);
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.15);
        }

        .district-name {
            font-size: 24px;
            font-weight: 600;
            color: #333;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .district-icon {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 20px;
        }

        .current-weather {
            display: flex;
            align-items: center;
            margin-bottom: 25px;
            padding-bottom: 25px;
            border-bottom: 1px solid #eee;
        }

        .temp-display {
            font-size: 72px;
            font-weight: 300;
            color: #333;
            line-height: 1;
        }

        .temp-unit {
            font-size: 30px;
            color: #666;
        }

        .weather-details {
            margin-left: 30px;
        }

        .weather-desc {
            font-size: 20px;
            color: #333;
            margin-bottom: 8px;
        }

        .weather-meta {
            font-size: 14px;
            color: #666;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .forecast-section {
            margin-top: 20px;
        }

        .forecast-title {
            font-size: 16px;
            color: #333;
            margin-bottom: 15px;
            font-weight: 600;
        }

        .forecast-list {
            display: flex;
            gap: 10px;
            overflow-x: auto;
            padding-bottom: 10px;
        }

        .forecast-item {
            flex: 0 0 auto;
            background: #f8f9fa;
            border-radius: 12px;
            padding: 12px 15px;
            text-align: center;
            min-width: 90px;
        }

        .forecast-day {
            font-size: 13px;
            color: #666;
            margin-bottom: 8px;
        }

        .forecast-icon {
            font-size: 28px;
            margin-bottom: 8px;
        }

        .forecast-temp {
            font-size: 15px;
            color: #333;
            font-weight: 500;
        }

        .forecast-night-temp {
            font-size: 13px;
            color: #999;
            margin-top: 2px;
        }

        .action-bar {
            background: rgba(255,255,255,0.95);
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.15);
        }

        .action-title {
            font-size: 16px;
            color: #333;
            margin-bottom: 15px;
            font-weight: 600;
        }

        .action-buttons {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        .action-btn {
            flex: 1;
            min-width: 150px;
            padding: 14px 20px;
            border: none;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .action-btn.primary {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }

        .action-btn.primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        .action-btn.secondary {
            background: #f0f0f0;
            color: #333;
        }

        .action-btn.secondary:hover {
            background: #e0e0e0;
        }

        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: #333;
            color: white;
            padding: 15px 25px;
            border-radius: 10px;
            font-size: 14px;
            opacity: 0;
            transition: all 0.3s;
            z-index: 1000;
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #666;
        }

        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 3px solid #f0f0f0;
            border-top-color: #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .error-msg {
            text-align: center;
            padding: 40px;
            color: #e74c3c;
        }

        .comparison-table {
            width: 100%;
            margin-top: 20px;
            background: rgba(255,255,255,0.95);
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.15);
        }

        .comparison-title {
            font-size: 18px;
            color: #333;
            margin-bottom: 20px;
            font-weight: 600;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            padding: 12px;
            text-align: center;
            border-bottom: 1px solid #eee;
        }

        th {
            background: #f8f9fa;
            color: #666;
            font-weight: 500;
            font-size: 13px;
        }

        td {
            color: #333;
            font-size: 14px;
        }

        .weather-summary {
            margin-top: 20px;
            padding: 20px;
            background: rgba(255,255,255,0.95);
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.15);
        }

        .summary-title {
            font-size: 16px;
            color: #333;
            margin-bottom: 15px;
            font-weight: 600;
        }

        .summary-content {
            font-size: 14px;
            color: #666;
            line-height: 1.8;
        }

        .alert-badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
        }

        .alert-badge.high-temp {
            background: #ffebee;
            color: #e53935;
        }

        .alert-badge.low-temp {
            background: #e3f2fd;
            color: #1e88e5;
        }

        .alert-badge.rain {
            background: #e8f5e9;
            color: #43a047;
        }

        .alert-badge.wind {
            background: #fff3e0;
            color: #fb8c00;
        }

        .diff-badge {
            font-size: 12px;
            padding: 3px 8px;
            border-radius: 10px;
            margin-left: 8px;
        }

        .diff-badge.cooler {
            background: #e3f2fd;
            color: #1e88e5;
        }

        .diff-badge.warmer {
            background: #ffebee;
            color: #e53935;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🌤️ 北京天气预报</h1>
            <p>顺义区 & 朝阳区 实时天气 · 数据来源：Open-Meteo</p>
            <div class="update-time" id="updateTime">数据加载中...</div>
        </div>

        <div class="weather-grid">
            <div class="weather-card" id="shunyiCard">
                <div class="loading">
                    <div class="loading-spinner"></div>
                    <p>正在获取顺义天气...</p>
                </div>
            </div>

            <div class="weather-card" id="chaoyangCard">
                <div class="loading">
                    <div class="loading-spinner"></div>
                    <p>正在获取朝阳天气...</p>
                </div>
            </div>
        </div>

        <div class="comparison-table">
            <div class="comparison-title">📊 两区天气对比</div>
            <table id="comparisonTable">
                <thead>
                    <tr>
                        <th>区域</th>
                        <th>当前温度</th>
                        <th>湿度</th>
                        <th>风速</th>
                        <th>天气</th>
                    </tr>
                </thead>
                <tbody id="comparisonBody">
                    <tr>
                        <td colspan="5" style="text-align: center; padding: 30px; color: #999;">
                            加载对比数据...
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

        <div class="weather-summary" id="summarySection" style="display: none;">
            <div class="summary-title">📝 天气分析</div>
            <div class="summary-content" id="summaryContent"></div>
        </div>

        <div class="action-bar">
            <div class="action-title">📢 天气推送</div>
            <div class="action-buttons">
                <button class="action-btn primary" onclick="enableNotifications()">
                    🔔 开启推送通知
                </button>
                <button class="action-btn secondary" onclick="copyWeatherReport()">
                    📋 复制天气报告
                </button>
                <button class="action-btn secondary" onclick="refreshWeather()">
                    🔄 刷新数据
                </button>
            </div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        const DISTRICTS = {
            shunyi: {
                name: '顺义区',
                lat: 40.13,
                lon: 116.65,
                cardId: 'shunyiCard',
                icon: '🏙️'
            },
            chaoyang: {
                name: '朝阳区',
                lat: 39.92,
                lon: 116.44,
                cardId: 'chaoyangCard',
                icon: '🌆'
            }
        };

        let weatherData = {
            shunyi: null,
            chaoyang: null
        };

        const WMO_CODES = {
            0: { desc: '晴', icon: '☀️' },
            1: { desc: '晴间多云', icon: '🌤️' },
            2: { desc: '多云', icon: '⛅' },
            3: { desc: '阴', icon: '☁️' },
            45: { desc: '雾', icon: '🌫️' },
            48: { desc: '霜雾', icon: '🌫️' },
            51: { desc: '小毛毛雨', icon: '🌦️' },
            53: { desc: '中毛毛雨', icon: '🌦️' },
            55: { desc: '大毛毛雨', icon: '🌧️' },
            61: { desc: '小雨', icon: '🌧️' },
            63: { desc: '中雨', icon: '🌧️' },
            65: { desc: '大雨', icon: '⛈️' },
            71: { desc: '小雪', icon: '🌨️' },
            73: { desc: '中雪', icon: '❄️' },
            75: { desc: '大雪', icon: '❄️' },
            77: { desc: '雪粒', icon: '🌨️' },
            80: { desc: '阵雨', icon: '🌦️' },
            81: { desc: '中阵雨', icon: '🌧️' },
            82: { desc: '大阵雨', icon: '⛈️' },
            85: { desc: '阵雪', icon: '🌨️' },
            86: { desc: '大雪阵雪', icon: '❄️' },
            95: { desc: '雷暴', icon: '⛈️' },
            96: { desc: '雷暴加冰雹', icon: '⛈️' },
            99: { desc: '强雷暴加冰雹', icon: '⛈️' }
        };

        function getWeatherInfo(code) {
            return WMO_CODES[code] || { desc: '未知', icon: '🌤️' };
        }

        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        function formatDate(dateStr) {
            const date = new Date(dateStr);
            const weekday = ['周日', '周一', '周二', '周三', '周四', '周五', '周六'][date.getDay()];
            return `${date.getMonth() + 1}/${date.getDate()} ${weekday}`;
        }

        async function fetchWeather(district) {
            const { lat, lon } = district;
            const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,relative_humidity_2m,weather_code,wind_speed_10m&daily=weather_code,temperature_2m_max,temperature_2m_min&timezone=Asia/Shanghai&forecast_days=4`;

            try {
                const response = await fetch(url);
                const data = await response.json();
                return data;
            } catch (error) {
                console.error('获取天气失败:', error);
                return null;
            }
        }

        function renderWeatherCard(data, district) {
            const card = document.getElementById(district.cardId);

            if (!data || !data.current) {
                card.innerHTML = `<div class="error-msg">获取天气数据失败<br><br><button onclick="refreshWeather()" class="action-btn secondary">点击重试</button></div>`;
                return;
            }

            const current = data.current;
            const daily = data.daily;
            const weather = getWeatherInfo(current.weather_code);

            let alerts = [];
            if (daily && daily.temperature_2m_max && daily.temperature_2m_max[0] > 35) {
                alerts.push('<span class="alert-badge high-temp">高温预警</span>');
            }
            if (daily && daily.temperature_2m_min && daily.temperature_2m_min[0] < 0) {
                alerts.push('<span class="alert-badge low-temp">低温预警</span>');
            }
            if ([61, 63, 65, 80, 81, 82, 95, 96, 99].includes(current.weather_code)) {
                alerts.push('<span class="alert-badge rain">有雨</span>');
            }
            if (current.wind_speed_10m > 30) {
                alerts.push('<span class="alert-badge wind">大风</span>');
            }

            const forecastItems = daily ? daily.time.slice(0, 4).map((date, i) => {
                const dayWeather = getWeatherInfo(daily.weather_code[i]);
                return `
                    <div class="forecast-item">
                        <div class="forecast-day">${formatDate(date)}</div>
                        <div class="forecast-icon">${dayWeather.icon}</div>
                        <div class="forecast-temp">${Math.round(daily.temperature_2m_max[i])}°</div>
                        <div class="forecast-night-temp">${Math.round(daily.temperature_2m_min[i])}°</div>
                    </div>
                `;
            }).join('') : '';

            card.innerHTML = `
                <div class="district-name">
                    <div class="district-icon">${district.icon}</div>
                    ${district.name}
                </div>

                <div class="current-weather">
                    <div class="temp-display">
                        ${Math.round(current.temperature_2m)}<span class="temp-unit">°C</span>
                    </div>
                    <div class="weather-details">
                        <div class="weather-desc">
                            ${weather.icon} ${weather.desc}
                            ${alerts.length > 0 ? '<br>' + alerts.join(' ') : ''}
                        </div>
                        <div class="weather-meta">
                            <span>💧 湿度 ${current.relative_humidity_2m}%</span>
                            <span>🌬️ 风速 ${current.wind_speed_10m} km/h</span>
                        </div>
                    </div>
                </div>

                <div class="forecast-section">
                    <div class="forecast-title">📅 未来预报</div>
                    <div class="forecast-list">
                        ${forecastItems}
                    </div>
                </div>
            `;
        }

        function renderComparison() {
            const s = weatherData.shunyi;
            const c = weatherData.chaoyang;

            if (!s || !c) return;

            const sWeather = getWeatherInfo(s.current.weather_code);
            const cWeather = getWeatherInfo(c.current.weather_code);

            const tempDiff = s.current.temperature_2m - c.current.temperature_2m;
            let diffBadge = '';
            if (Math.abs(tempDiff) > 0.5) {
                const badgeClass = tempDiff > 0 ? 'cooler' : 'warmer';
                const diffText = tempDiff > 0 ? `顺义高${Math.abs(tempDiff).toFixed(1)}°` : `朝阳高${Math.abs(tempDiff).toFixed(1)}°`;
                diffBadge = `<span class="diff-badge ${badgeClass}">${diffText}</span>`;
            }

            const tbody = document.getElementById('comparisonBody');
            tbody.innerHTML = `
                <tr>
                    <td>🏙️ 顺义</td>
                    <td>${Math.round(s.current.temperature_2m)}°C</td>
                    <td>${s.current.relative_humidity_2m}%</td>
                    <td>${s.current.wind_speed_10m} km/h</td>
                    <td>${sWeather.icon} ${sWeather.desc}</td>
                </tr>
                <tr>
                    <td>🌆 朝阳</td>
                    <td>${Math.round(c.current.temperature_2m)}°C</td>
                    <td>${c.current.relative_humidity_2m}%</td>
                    <td>${c.current.wind_speed_10m} km/h</td>
                    <td>${cWeather.icon} ${cWeather.desc}</td>
                </tr>
            `;

            document.getElementById('summarySection').style.display = 'block';
            generateSummary(diffBadge);
        }

        function generateSummary(diffBadge) {
            const s = weatherData.shunyi;
            const c = weatherData.chaoyang;

            const sWeather = getWeatherInfo(s.current.weather_code);
            const cWeather = getWeatherInfo(c.current.weather_code);

            let summary = `今日（${formatDate(new Date().toISOString().split('T')[0])}）北京顺义区和朝阳区天气：\n\n`;

            summary += `【顺义区】${sWeather.desc}，温度 ${Math.round(s.current.temperature_2m)}°C，湿度 ${s.current.relative_humidity_2m}%，风速 ${s.current.wind_speed_10m} km/h。\n`;
            summary += `【朝阳区】${cWeather.desc}，温度 ${Math.round(c.current.temperature_2m)}°C，湿度 ${c.current.relative_humidity_2m}%，风速 ${c.current.wind_speed_10m} km/h。\n\n`;

            if (diffBadge) {
                summary += `📌 温度差异：${diffBadge}。\n`;
            }

            if (sWeather.desc !== cWeather.desc) {
                summary += `📌 天气差异：顺义${sWeather.desc}，朝阳${cWeather.desc}。\n`;
            }

            const rainCodes = [61, 63, 65, 80, 81, 82, 95, 96, 99];
            if (rainCodes.includes(s.current.weather_code) || rainCodes.includes(c.current.weather_code)) {
                summary += `\n🌧️ 降雨提示：今日有降水可能，出门请带雨具。\n`;
            }

            document.getElementById('summaryContent').textContent = summary;
        }

        async function loadWeather() {
            const [sData, cData] = await Promise.all([
                fetchWeather(DISTRICTS.shunyi),
                fetchWeather(DISTRICTS.chaoyang)
            ]);

            weatherData.shunyi = sData;
            weatherData.chaoyang = cData;

            if (sData) {
                renderWeatherCard(sData, DISTRICTS.shunyi);
            }
            if (cData) {
                renderWeatherCard(cData, DISTRICTS.chaoyang);
            }

            if (sData && cData) {
                renderComparison();
                const now = new Date();
                document.getElementById('updateTime').textContent =
                    `🕐 更新时间：${now.toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' })}`;
            }
        }

        function refreshWeather() {
            document.getElementById('shunyiCard').innerHTML = `
                <div class="loading">
                    <div class="loading-spinner"></div>
                    <p>正在获取顺义天气...</p>
                </div>`;
            document.getElementById('chaoyangCard').innerHTML = `
                <div class="loading">
                    <div class="loading-spinner"></div>
                    <p>正在获取朝阳天气...</p>
                </div>`;
            loadWeather();
            showToast('🔄 正在刷新天气数据...');
        }

        async function enableNotifications() {
            if (!('Notification' in window)) {
                showToast('❌ 您的浏览器不支持通知功能');
                return;
            }

            const permission = await Notification.requestPermission();
            if (permission === 'granted') {
                new Notification('北京天气预报', {
                    body: '推送通知已开启！',
                    icon: '🌤️'
                });

                if (weatherData.shunyi && weatherData.chaoyang) {
                    const s = weatherData.shunyi;
                    const c = weatherData.chaoyang;
                    const sWeather = getWeatherInfo(s.current.weather_code);
                    const cWeather = getWeatherInfo(c.current.weather_code);

                    new Notification('🌡️ 今日天气', {
                        body: `顺义: ${sWeather.desc} ${Math.round(s.current.temperature_2m)}°C | 朝阳: ${cWeather.desc} ${Math.round(c.current.temperature_2m)}°C`,
                        icon: '🌤️'
                    });
                }

                showToast('✅ 天气推送已开启！');
            } else {
                showToast('❌ 未获得通知权限');
            }
        }

        function copyWeatherReport() {
            const summary = document.getElementById('summaryContent').textContent;
            if (!summary) {
                showToast('❌ 暂无天气报告可复制');
                return;
            }

            const fullReport = `📅 ${new Date().toLocaleDateString('zh-CN')}
${'═'.repeat(30)}
${summary}
${'═'.repeat(30)}
来源：北京天气预报 | Open-Meteo | 顺义&朝阳`;

            navigator.clipboard.writeText(fullReport).then(() => {
                showToast('📋 天气报告已复制到剪贴板！');
            }).catch(() => {
                showToast('❌ 复制失败，请手动复制');
            });
        }

        loadWeather();

        setInterval(() => {
            loadWeather();
        }, 30 * 60 * 1000);
    </script>
</body>
</html>
